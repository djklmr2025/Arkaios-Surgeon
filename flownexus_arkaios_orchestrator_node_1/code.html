<script>
        // Micro-interactions for HUD coords
        const main = document.querySelector('main');
        const coordDisplay = document.querySelector('span:nth-child(3)');
        
        main.addEventListener('mousemove', (e) => {
            const x = Math.round(e.clientX - main.getBoundingClientRect().left);
            const y = Math.round(e.clientY - main.getBoundingClientRect().top);
            if (coordDisplay) coordDisplay.textContent = `COORDS: ${x}, ${y}`;
        });

        // Toggle Active State logic for Bottom Nav
        const navButtons = document.querySelectorAll('nav.fixed button');
        navButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                navButtons.forEach(b => {
                    b.className = "text-on-surface-variant p-3 transition-transform duration-200 hover:scale-110 active:scale-90";
                });
                btn.className = "bg-primary-container text-on-primary-container rounded-full p-3 shadow-[0_0_15px_rgba(0,212,255,0.4)] transition-transform duration-200 hover:scale-110 active:scale-90";
