<script>
    // --- CANVAS ENGINE (Corazón del Sistema) ---
    const canvas = document.getElementById('core-canvas');
    const ctx = canvas.getContext('2d');
    const rippleArea = document.getElementById('ripple-area');

    // MOCK DATA (Metro CDMX map bounds simulation)
    const METRO_MAP_URL = "https://lh3.googleusercontent.com/aida-public/AB6AXuC54wW5Yj06ty8PSCk9t1RiGItgyJG1jKaGMencXhtV8fsKunsp9GySdM-V6QZo-NMm6ZTfyEey1mY7GegW0BF9ivkJbqBjTF1FR6IsXTyIj4OBKYSRsnP8tZtGsY2aTuilgpNcAaoZ1R2haV1JgGZhDrVOx87QCzySbC2Eb-Yt2TssstQtnvi3xQFNk-YjAD3lpR_ysgBNQHiwfiBW2qezn9S42rFg5v6i3n0dN4j9CdpziIFnXDyB33-OCO9huYk6_ztjwc4is-k";
    
    // World coordinates (The real map size in units)
    const worldBounds = {
        width: 1920,
        height: 1080
    };

    // Camera State (Mundo -> Pantalla)
    let camera = {
        x: 0,
        y: 0,
        zoom: 0.1,
        targetZoom: 0.1
    };

    // Movers State
    const movers = [
        { id: 'T1', route: [{x:400, y:300}, {x:1200, y:300}], progress: 0, speed: 0.001, color: '#a8e8ff' },
        { id: 'T2', route: [{x:600, y:200}, {x:600, y:800}], progress: 0.3, speed: 0.0015, color: '#3ee272' },
        { id: 'T3', route: [{x:1000, y:900}, {x:300, y:500}], progress: 0.6, speed: 0.0008, color: '#ffd5d6' }
    ];

    const mapImage = new Image();
    mapImage.src = METRO_MAP_URL;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        autoFit();
    }

    /**
     * Calculates the bounding box and centers it within the viewport with 10% padding.
     * Structural update to handle world-to-screen transformations with initial auto-fit.
     */
    function autoFit() {
        const padding = 0.9; // 10% total padding (0.9 scale)
        const vWidth = window.innerWidth;
        const vHeight = window.innerHeight;
        
        // Calculate zoom needed to fit the whole worldBounds
        const scaleX = vWidth / worldBounds.width;
        const scaleY = vHeight / worldBounds.height;
        const fitZoom = Math.min(scaleX, scaleY) * padding;
        
        camera.targetZoom = fitZoom;
        camera.zoom = fitZoom; // Immediate for first frame

        // Center the camera on the worldBounds center
        // camera.x and camera.y represent the top-left offset in screen pixels
        camera.x = (vWidth - worldBounds.width * fitZoom) / 2;
        camera.y = (vHeight - worldBounds.height * fitZoom) / 2;
    }

    window.addEventListener('resize', resize);

    // Logic: Coordinate Transformation
    function worldToScreen(wx, wy) {
        return {
            x: wx * camera.zoom + camera.x,
            y: wy * camera.zoom + camera.y
        };
    }

    // Main Render Loop
    function render() {
        ctx.fillStyle = '#050712';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Smooth zoom transition
        camera.zoom += (camera.targetZoom - camera.zoom) * 0.1;

        // 1. Render Layer: Image (Base)
        ctx.save();
        ctx.globalAlpha = 0.7;
        ctx.drawImage(mapImage, camera.x, camera.y, worldBounds.width * camera.zoom, worldBounds.height * camera.zoom);
        ctx.restore();

        // 2. Render Layer: Paths
        ctx.strokeStyle = 'rgba(168, 232, 255, 0.15)';
        ctx.lineWidth = 2 * camera.zoom;
        movers.forEach(m => {
            const start = worldToScreen(m.route[0].x, m.route[0].y);
            const end = worldToScreen(m.route[1].x, m.route[1].y);
            ctx.beginPath();
            ctx.moveTo(start.x, start.y);
            ctx.lineTo(end.x, end.y);
            ctx.stroke();
        });

        // 3. Render Layer: Movers
        movers.forEach(m => {
            m.progress = (m.progress + m.speed) % 1;
            const x = m.route[0].x + (m.route[1].x - m.route[0].x) * m.progress;
            const y = m.route[0].y + (m.route[1].y - m.route[0].y) * m.progress;
            const screenPos = worldToScreen(x, y);

            ctx.shadowBlur = 15;
            ctx.shadowColor = m.color;
            ctx.fillStyle = m.color;
            ctx.beginPath();
            ctx.arc(screenPos.x, screenPos.y, 6 * camera.zoom + 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            ctx.font = `${Math.max(8, 10 * camera.zoom)}px JetBrains Mono`;
            ctx.fillText(`ID-${m.id}`, screenPos.x + 10, screenPos.y - 10);
        });

        requestAnimationFrame(render);
    }

    mapImage.onload = () => {
        resize(); // Auto-fit once image metadata (size) is known if needed, but here we use worldBounds
        render();
    };

    // Interaction Handlers
    let isDragging = false;
    let lastX, lastY;

    canvas.addEventListener('pointerdown', (e) => {
        isDragging = true;
        lastX = e.clientX;
        lastY = e.clientY;
        
        const ripple = document.createElement('div');
        ripple.classList.add('ripple');
        ripple.style.left = `${e.clientX - 25}px`;
        ripple.style.top = `${e.clientY - 25}px`;
        ripple.style.width = '50px';
        ripple.style.height = '50px';
        rippleArea.appendChild(ripple);
        ripple.addEventListener('animationend', () => ripple.remove());
    });

    window.addEventListener('pointermove', (e) => {
        if (!isDragging) return;
        const dx = e.clientX - lastX;
        const dy = e.clientY - lastY;
        camera.x += dx;
        camera.y += dy;
        lastX = e.clientX;
        lastY = e.clientY;
    });

    window.addEventListener('pointerup', () => isDragging = false);

    // Zoom Controls
    document.getElementById('btn-natural').addEventListener('click', () => {
        autoFit();
    });

    document.getElementById('btn-hd').addEventListener('click', () => {
        camera.targetZoom = 1.2;
    });

    // Drawer Logic
    const drawer = document.getElementById('drawer');
    const drawerToggle = document.getElementById('drawer-toggle');
    let drawerOpen = false;

    drawerToggle.addEventListener('click', () => {
        drawerOpen = !drawerOpen;
        drawer.style.transform = drawerOpen ? 'translateX(0)' : 'translateX(-100%)';
        drawerToggle.querySelector('span').innerText = drawerOpen ? 'close' : 'menu';
    });

    document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
    
    // Initial call to ensure correct centering on load
    resize();
</script>
