<script>
        // Liquid glass droplets simulation
        const container = document.getElementById('liquid-container');
        const createDrop = () => {
            const drop = document.createElement('div');
            drop.className = 'liquid-drop';
            drop.style.left = Math.random() * 100 + 'vw';
            drop.style.animationDuration = (Math.random() * 2 + 1) + 's';
            drop.style.width = (Math.random() * 2 + 1) + 'px';
            container.appendChild(drop);
            setTimeout(() => drop.remove(), 3000);
        };

        // Create initial burst
        for(let i=0; i<20; i++) setTimeout(createDrop, i * 100);
        
        // Continuous cycle
        setInterval(createDrop, 400);

        // Simple parallax on mouse/touch
        document.addEventListener('mousemove', (e) => {
            const aura = document.querySelector('.priestess-aura');
            const x = (window.innerWidth / 2 - e.pageX) / 50;
            const y = (window.innerHeight / 2 - e.pageY) / 50;
            aura.style.transform = `translateX(${x}px) translateY(${y}px)`;
        });
    </script>
