<script>
        // Simple micro-interaction for the dialogue bubble text appearance
        document.addEventListener('DOMContentLoaded', () => {
            const dialogue = document.querySelector('p.italic');
            const text = dialogue.innerText;
            dialogue.innerText = '';
            let i = 0;
            
            function typeWriter() {
                if (i < text.length) {
                    dialogue.innerText += text.charAt(i);
                    i++;
                    setTimeout(typeWriter, 30);
                }
            }
            
            // Delay start slightly
            setTimeout(typeWriter, 1000);
        });
    </script>
