<!-- LIVE TOAST -->

<!-- SYSTEM ENGINE AND LOGIC -->
<script>
const API_BASE = 'https://flow-diagram-creator.vercel.app';
let projectsList = [];
let animators = [];
let globalRaf = null;

// Notification helper
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.style.opacity = '0', 3000);
}

// Modal actions
function openPublishModal() { document.getElementById('publish-modal').classList.remove('hidden'); }
function closePublishModal() {
  document.getElementById('publish-modal').classList.add('hidden');
  document.getElementById('pub-name').value = '';
  document.getElementById('drop-text').textContent = 'Arrastra tu archivo .json aquí o haz click para seleccionar';
  selectedProjectData = null;
}

// File Drag & Drop
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
let selectedProjectData = null;

dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', (e) => handleFileSelect(e.target.files[0]));

dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('border-primary'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('border-primary'));
dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('border-primary');
  handleFileSelect(e.dataTransfer.files[0]);
});

function handleFileSelect(file) {
  if (!file) return;
  if (!file.name.endsWith('.json')) {
    showToast('⚠️ Solo se admiten archivos .json');
    return;
  }
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data.elements)) {
        showToast('⚠️ El JSON no tiene un formato válido de Flow Diagram');
        return;
      }
      selectedProjectData = data;
      document.getElementById('drop-text').textContent = `✅ ${file.name} listo para subir`;
      if (!document.getElementById('pub-name').value) {
        document.getElementById('pub-name').value = data.name || file.name.replace('.json', '');
      }
    } catch(err) {
      showToast('⚠️ Error al leer JSON');
    }
  };
  reader.readAsText(file);
}

// Publish payload
async function submitProject() {
  if (!selectedProjectData) {
    showToast('⚠️ Por favor selecciona un archivo .json');
    return;
  }
  const name = document.getElementById('pub-name').value.trim() || 'Proyecto sin nombre';
  const author = document.getElementById('pub-author').value.trim() || 'Anónimo';
  const btn = document.getElementById('btn-submit');
  
  btn.disabled = true;
  btn.textContent = 'Subiendo...';
  
  const payload = {
    name: name,
    folder: 'community',
    elements: selectedProjectData.elements,
    camera: selectedProjectData.camera || { x: 0, y: 0, zoom: 1 }
  };
  
  // Guardar metadatos en un elemento dummy text si quisiéramos autoría
  payload.elements.push({
    type: 'text',
    text: `Autor: ${author}`,
    x: -99999,
    y: -99999,
    fontSize: 1,
    hidden: true
  });

  try {
    const res = await fetch(`${API_BASE}/api/publish-project`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const result = await res.json();
    if (result.ok) {
      showToast('🎉 ¡Proyecto publicado con éxito!');
      closePublishModal();
      loadFeed();
    } else {
      showToast(`⚠️ Error: ${result.error || 'No se pudo subir'}`);
    }
  } catch(e) {
    showToast('⚠️ Error en la red');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Publicar Diagrama';
  }
}

// FETCH AND RENDER THE FEED
async function loadFeed() {
  stopGlobalAnimation();
  const container = document.getElementById('feed-container');
  container.innerHTML = `
    <div class="flex flex-col items-center justify-center py-16 gap-3">
      <div class="animate-spin rounded-full h-8 w-8 border-2 border-primary border-t-transparent"></div>
      <p class="text-xs text-on-surface-variant font-mono">Conectando con Vercel Blob...</p>
    </div>
  `;

  try {
    const res = await fetch(`${API_BASE}/api/library?scope=projects`);
    const data = await res.json();
    if (!data.ok || !data.blobs || !data.blobs.length) {
      container.innerHTML = `<div class="text-center py-12 text-on-surface-variant text-sm">No hay proyectos publicados aún. ¡Sé el primero!</div>`;
      return;
    }

    // Ordenar de más recientes a más antiguos
    const sortedBlobs = data.blobs.sort((a, b) => new Date(b.uploadedAt) - new Date(a.uploadedAt));
    
    container.innerHTML = '';
    
    // Cargar detalles de los primeros 10 proyectos
    for (const blob of sortedBlobs.slice(0, 10)) {
      try {
        const pRes = await fetch(`${API_BASE}/api/project?id=${encodeURIComponent(blob.pathname)}`);
        const project = await pRes.json();
        
        // Buscar metadatos de autoría si existen
        let author = 'Comunidad';
        const dummyText = project.elements?.find(e => e.type === 'text' && String(e.text).startsWith('Autor: '));
        if (dummyText) {
          author = dummyText.text.replace('Autor: ', '');
          // Remover el dummy text del render
          project.elements = project.elements.filter(e => e !== dummyText);
        }

        renderProjectCard(container, blob.pathname, project, author);
      } catch(err) {
        console.error('Error cargando detalles:', err);
      }
    }
    
    startGlobalAnimation();
  } catch(e) {
    container.innerHTML = `<div class="text-center py-12 text-error text-sm">Error cargando el feed.</div>`;
  }
}

// CARD RENDERER WITH LIGHTWEIGHT SVG PREVIEW ENGINE
function renderProjectCard(container, id, project, author) {
  const card = document.createElement('article');
  card.className = 'glass-panel rounded-2xl overflow-hidden flex flex-col shadow-2xl cyber-glow transition-all duration-300';
  
  // Header
  const dateStr = new Date(project.date || Date.now()).toLocaleDateString('es-ES', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
  const viewUrl = `../flownexus_motor_visor_real_v2/code.html?id=${encodeURIComponent(id)}`;
  
  card.innerHTML = `
    <div class="p-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-full bg-primary/10 flex items-center justify-center border border-primary/20">
          <span class="material-symbols-outlined text-primary text-[20px]">person</span>
        </div>
        <div>
          <p class="font-bold text-sm text-on-surface leading-none">${author}</p>
          <p class="text-[10px] text-on-surface-variant font-mono mt-1">${dateStr}</p>
        </div>
      </div>
      <a href="${viewUrl}" target="_blank" class="text-primary hover:text-primary-container transition-colors" title="Abrir en pantalla completa">
        <span class="material-symbols-outlined">open_in_new</span>
      </a>
    </div>
    
    <!-- SVG Interactive Viewport -->
    <div class="card-stage">
      <svg class="card-svg" id="svg-card-${id.replace(/\//g, '-')}" xmlns="http://www.w3.org/2000/svg">
        <defs></defs>
        <g class="world-group"></g>
      </svg>
    </div>
    
    <!-- Meta and Footer -->
    <div class="p-4 flex flex-col gap-2 bg-background/30">
      <div class="flex items-center justify-between">
        <h4 class="font-bold text-sm text-primary">${project.name || 'Proyecto sin Nombre'}</h4>
        <span class="text-[10px] bg-primary/10 text-primary border border-primary/20 px-2 py-0.5 rounded-full font-mono font-semibold uppercase">Real SVG</span>
      </div>
      <p class="text-xs text-on-surface-variant leading-relaxed">
        Contiene <span class="text-primary font-bold font-mono">${(project.elements || []).length}</span> elementos vectoriales animados. Clic en el botón superior para explorar e interactuar en pantalla completa.
      </p>
    </div>
  `;
  
  container.appendChild(card);
  
  // Render del SVG
  const svg = document.getElementById(`svg-card-${id.replace(/\//g, '-')}`);
  if (svg) {
    setupPreviewEngine(svg, project);
  }
}

// PREVIEW RENDER SYSTEM
function setupPreviewEngine(svg, project) {
  const defs = svg.querySelector('defs');
  const world = svg.querySelector('.world-group');
  
  const state = {
    elements: project.elements || [],
    lineNodes: [],
    moverNodes: [],
    flat: [],
    byId: new Map()
  };
  
  state.flat = flatten(state.elements);
  state.byId = new Map(state.flat.map(e => [String(e.id || ''), e]));
  
  // Render all elements
  state.elements.forEach(e => renderPreviewEl(e, world, defs, state));
  
  // Auto zoom/fit preview inside card
  fitCardView(svg, world, state.elements);
  
  animators.push(state);
}

// Render SVG element inside preview card
function renderPreviewEl(elem, parent, defs, state) {
  if (!elem || elem.hidden === true) return;

  if (elem.type === 'group' && Array.isArray(elem.elements)) {
    const g = svgEl('g', { 'data-id': elem.id || '' });
    parent.appendChild(g);
    elem.elements.forEach(c => renderPreviewEl(c, g, defs, state));
    return;
  }

  const fill = gradFill(elem.fillColor || 'transparent', elem.fillGradient, defs);
  const stroke = elem.strokeColor || 'transparent';
  const lw = Number(elem.lineWidth ?? elem.strokeWidth ?? 2);
  const isMover = elem.type === 'mover';
  const isFollower = elem.followRoute === true && elem.routeId;
  let node = null;

  if (elem.type === 'line') {
    const curve = elem.routeCircular ? 'circle' : String(elem.routeCurve || 'line').toLowerCase();
    if (curve !== 'line') {
      const pts = getRoutePts(elem);
      node = svgEl('polyline', { points: pts.map(p => `${p.x},${p.y}`).join(' '), fill: 'none', stroke, 'stroke-width': lw, 'stroke-linecap': 'round', 'stroke-dasharray': elem.active ? '5 5' : null });
    } else {
      const x1 = Number(elem.x ?? 0), y1 = Number(elem.y ?? 0);
      const x2 = Number(elem.endX ?? 0), y2 = Number(elem.endY ?? 0);
      node = svgEl('line', { x1, y1, x2, y2, stroke, 'stroke-width': lw, 'stroke-linecap': 'round', 'stroke-dasharray': elem.active ? '5 5' : null });
    }
    if (elem.active) state.lineNodes.push({ node, speed: Math.max(0.2, Number(elem.speed) || 1), offset: 0 });

  } else if (elem.type === 'rectangle' || elem.type === 'rect') {
    const { x, y, w, h } = getRectLike(elem);
    node = svgEl('rect', { x, y, width: w, height: h, rx: Number(elem.radius ?? 0), fill, stroke, 'stroke-width': lw });

  } else if (elem.type === 'circle') {
    const { x, y, w, h } = getRectLike(elem);
    const r = Number(elem.radius ?? Math.min(w, h) / 2);
    const cx = Number(elem.cx ?? (x + (w || r * 2) / 2));
    const cy = Number(elem.cy ?? (y + (h || r * 2) / 2));
    node = svgEl('circle', { cx, cy, r, fill, stroke, 'stroke-width': lw });

  } else if (elem.type === 'path' || elem.type === 'polygon') {
    const pts = Array.isArray(elem.points) ? elem.points : [];
    const pointsAttr = pts.map(p => `${Number(p.x ?? 0)},${Number(p.y ?? 0)}`).join(' ');
    if (pointsAttr) node = svgEl('polygon', { points: pointsAttr, fill, stroke, 'stroke-width': lw });

  } else if (elem.type === 'image') {
    const { x, y, w, h } = getRectLike(elem);
    const src = elem.imageSrc || elem.imageData || '';
    if (src) node = svgEl('image', { x, y, width: w, height: h, href: src, preserveAspectRatio: 'xMidYMid meet' });

  } else if (elem.type === 'text') {
    const x = Number(elem.x ?? 0), y = Number(elem.y ?? 0);
    node = svgEl('text', { x, y, 'font-size': Math.max(8, Number(elem.fontSize ?? 12)), 'font-family': 'Inter,sans-serif', fill: elem.fillColor || '#ffffff', 'text-anchor': 'middle' });
    node.textContent = String(elem.text || '');
  } else if (isMover) {
    const { x, y, w, h } = getRectLike(elem);
    const mw = Math.max(6, Number(w) * 0.7 || 28), mh = Math.max(6, Number(h) * 0.7 || 18);
    const fillS = elem.fillColor || '#93c5fd', strokeS = elem.strokeColor || '#0b1027';
    const g = svgEl('g');
    g.appendChild(svgEl('rect', { x: -mw/2, y: -mh/2, width: mw, height: mh, rx: 3, fill: fillS, stroke: strokeS, 'stroke-width': 1 }));
    node = g;
  }

  if (!node) return;

  if (Number.isFinite(elem.rotation) && elem.rotation !== 0 && !isMover) {
    const { x, y, w, h } = getRectLike(elem);
    node.setAttribute('transform',`rotate(${elem.rotation} ${x+w/2} ${y+h/2})`);
  }

  if (isMover || isFollower) {
    const ctr = getCenter(elem);
    if (isMover) {
      state.moverNodes.push({ node, elem, isMover: true, cx: ctr.x, cy: ctr.y });
      parent.appendChild(node);
    } else {
      const wr = svgEl('g');
      wr.appendChild(node);
      state.moverNodes.push({ wrapper: wr, node, elem, isMover: false, cx: ctr.x, cy: ctr.y });
      parent.appendChild(wr);
    }
  } else {
    parent.appendChild(node);
  }
}

// Helpers card viewport fitting
function fitCardView(svg, world, elements) {
  if (!elements.length) return;
  const flat = flatten(elements);
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  flat.forEach(e => {
    if (!e) return;
    const bounds = getBounds(e);
    if (!bounds) return;
    minX = Math.min(minX, bounds.x1); minY = Math.min(minY, bounds.y1);
    maxX = Math.max(maxX, bounds.x2); maxY = Math.max(maxY, bounds.y2);
  });
  if (!Number.isFinite(minX)) return;
  const cw = maxX - minX || 1, ch = maxY - minY || 1;
  const size = 320; // Stage aspect is 1:1, viewport matches standard card width
  const pad = 24;
  const z = Math.max(0.01, Math.min((size - pad*2)/cw, (size - pad*2)/ch));
  const px = size/2 - ((minX + cw/2)*z);
  const py = size/2 - ((minY + ch/2)*z);
  
  world.setAttribute('transform', `translate(${px} ${py}) scale(${z})`);
}

// CARD ANIMATION TICK LOOP
function startGlobalAnimation() {
