<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>

<title>Metro Holographic - Modo Descanso</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;family=JetBrains+Mono:wght@400&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Ripple Effect - Water Simulation */
        .ripple {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            animation: ripple-animation 1.5s cubic-bezier(0, 0.2, 0.4, 1);
            background: radial-gradient(circle, rgba(168, 232, 255, 0.3) 0%, rgba(168, 232, 255, 0.05) 50%, transparent 70%);
            border: 2px solid rgba(168, 232, 255, 0.2);
            box-shadow: inset 0 0 20px rgba(168, 232, 255, 0.1);
            pointer-events: none;
            backdrop-filter: contrast(1.2) brightness(1.1) blur(1px);
        }

        @keyframes ripple-animation {
            0% {
                transform: scale(0);
                opacity: 0.8;
            }
            100% {
                transform: scale(3);
                opacity: 0;
            }
        }

        /* Neon Breathing Effect */
        @keyframes neon-pulse {
            0%, 100% {
                text-shadow: 0 0 10px rgba(168, 232, 255, 0.5), 0 0 20px rgba(168, 232, 255, 0.2);
                opacity: 0.7;
                transform: scale(1);
            }
            50% {
                text-shadow: 0 0 25px rgba(168, 232, 255, 0.9), 0 0 40px rgba(168, 232, 255, 0.5);
                opacity: 1;
                transform: scale(1.02);
            }
        }

        .animate-neon-pulse {
            animation: neon-pulse 3s infinite ease-in-out;
            display: inline-block;
        }

        .cyber-void-overlay {
            background: radial-gradient(circle at center, transparent 0%, rgba(18, 19, 24, 0.7) 100%);
        }

        body {
            background-color: #050712;
            overflow: hidden;
            user-select: none;
        }
    </style>

                        "on-surface": "#e3e1e9",
                        "on-secondary-container": "#004a1d",

                        "tertiary": "#ffd5d6",
                        "surface-container-high": "#292a2f",

                        "surface-tint": "#3cd7ff",
                        "on-tertiary-fixed": "#40000e",
                        "secondary": "#3ee272",
                        "on-primary-fixed-variant": "#004e5f",
                        "on-primary-fixed": "#001f27",
                        "on-error": "#690005",
                        "tertiary-fixed-dim": "#ffb2b7",

                        "secondary-fixed-dim": "#3ee272",

                        "on-background": "#e3e1e9",

                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",

                    },
                    "spacing": {
                        "sidebar-width": "280px",
                        "margin-mobile": "12px",

        }

<body class="flex flex-col h-screen w-screen relative overflow-hidden" onclick="createRipple(event)">

<!-- Main Content: Central Attract State -->
<main class="relative z-10 flex-grow flex flex-col items-center justify-center pointer-events-none">
<div class="text-center space-y-8">

        </h2>

<div class="h-[1px] w-12 bg-gradient-to-r from-transparent to-primary"></div>

</div>
</div>

<!-- Author Signature Overlay -->
<div class="fixed top-20 right-6 z-20 pointer-events-none">
<div class="bg-surface-container-low/60 backdrop-blur-md border border-primary/20 p-4 rounded-lg flex flex-col items-end gap-1">
<span class="font-label-caps text-secondary text-[9px] tracking-widest">ECOSISTEMA INTELIGENTE</span>
<span class="font-body-bold text-on-surface text-xs italic opacity-80">firmado por Stitch AI Assistant</span>
</div>
</div>
<!-- Bottom Interface (Initially hidden) -->
<div class="fixed bottom-12 left-0 w-full flex justify-center z-50 opacity-0 transform translate-y-8 transition-all duration-1000 pointer-events-none" id="interaction-ui">
<button class="pointer-events-auto flex items-center gap-3 px-8 py-4 bg-surface-container-highest/80 backdrop-blur-2xl border border-white/10 rounded-full text-primary hover:bg-primary/10 hover:border-primary/40 transition-all active:scale-95 group shadow-[0_20px_60px_rgba(0,0,0,0.55)]" onclick="resetUI(event)">
<span class="material-symbols-outlined text-xl group-hover:rotate-180 transition-transform duration-500">replay</span>

</button>
</div>
<!-- Bottom Nav Bar -->
<nav class="fixed bottom-0 left-0 w-full z-40 flex justify-around items-center h-16 pb-safe bg-surface-container-lowest/90 backdrop-blur-md border-t border-secondary/30">
<div class="flex flex-col items-center text-on-surface-variant opacity-40">
<span class="material-symbols-outlined text-2xl">motion_photos_on</span>
<span class="font-label-caps text-[9px]">Live Feed</span>
</div>
<div class="flex flex-col items-center text-tertiary drop-shadow-[0_0_10px_rgba(255,173,179,0.6)]">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">touch_app</span>

</div>

<span class="material-symbols-outlined text-2xl">replay</span>
<span class="font-label-caps text-[9px]">Demo Loop</span>
</div>

<script>
    let firstTouch = false;

    function createRipple(event) {
        const body = document.body;
        const ripple = document.createElement("div");
        ripple.classList.add("ripple");
        
        // Size calculated to cover significant area for "water ripple" effect
        const size = Math.max(window.innerWidth, window.innerHeight) * 0.4;
        ripple.style.width = ripple.style.height = `${size}px`;
        
        const x = event.clientX - size / 2;
        const y = event.clientY - size / 2;
        
        ripple.style.left = `${x}px`;
        ripple.style.top = `${y}px`;
        
        body.appendChild(ripple);
        
        // Show Interaction UI on first touch
        if (!firstTouch) {
            const ui = document.getElementById('interaction-ui');
            ui.classList.remove('opacity-0', 'translate-y-8', 'pointer-events-none');
            ui.classList.add('opacity-100', 'translate-y-0');
            firstTouch = true;
        }

        ripple.addEventListener("animationend", () => {
            ripple.remove();
        });
    }

    function resetUI(event) {
        event.stopPropagation();
        const ui = document.getElementById('interaction-ui');
        ui.classList.add('opacity-0', 'translate-y-8', 'pointer-events-none');
        ui.classList.remove('opacity-100', 'translate-y-0');
        firstTouch = false;
    }
</script>
