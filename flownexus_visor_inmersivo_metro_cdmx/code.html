<script>
        // Water Ripple Effect
        const rippleArea = document.getElementById('ripple-area');
        rippleArea.addEventListener('mousedown', (e) => {
            const ripple = document.createElement('div');
            ripple.classList.add('ripple');
            ripple.style.left = `${e.clientX - 25}px`;
            ripple.style.top = `${e.clientY - 25}px`;
            ripple.style.width = '50px';
            ripple.style.height = '50px';
            rippleArea.appendChild(ripple);
            
            ripple.addEventListener('animationend', () => {
                ripple.remove();
            });
        });

        // Map Pan & Zoom
        const mapInner = document.getElementById('map-inner');
        const viewport = document.getElementById('map-viewport');
        let isDragging = false;
        let startX, startY, scrollLeft, scrollTop;
        let scale = 1;

        // Mode Switching
        const btnNatural = document.getElementById('btn-natural');
        const btnHD = document.getElementById('btn-hd');

        btnNatural.addEventListener('click', () => {
            scale = 1;
            mapInner.style.transform = `scale(${scale}) translate(0px, 0px)`;
            btnNatural.classList.add('bg-primary-container', 'text-on-primary-container');
            btnNatural.classList.remove('text-on-surface-variant');
            btnHD.classList.remove('bg-primary-container', 'text-on-primary-container');
            btnHD.classList.add('text-on-surface-variant');
        });

        btnHD.addEventListener('click', () => {
            scale = 2.5;
            mapInner.style.transform = `scale(${scale})`;
            btnHD.classList.add('bg-primary-container', 'text-on-primary-container');
            btnHD.classList.remove('text-on-surface-variant');
            btnNatural.classList.remove('bg-primary-container', 'text-on-primary-container');
            btnNatural.classList.add('text-on-surface-variant');
        });

        // Mouse Drag Panning
        viewport.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.pageX - mapInner.offsetLeft;
            startY = e.pageY - mapInner.offsetTop;
        });

        viewport.addEventListener('mouseleave', () => isDragging = false);
        viewport.addEventListener('mouseup', () => isDragging = false);

        viewport.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            const x = e.pageX - startX;
            const y = e.pageY - startY;
            mapInner.style.transform = `scale(${scale}) translate(${x/scale}px, ${y/scale}px)`;
        });

        // Drawer Toggle
        const drawer = document.getElementById('drawer');
        const toggle = document.getElementById('drawer-toggle');
        let drawerOpen = false;

        toggle.addEventListener('click', () => {
            drawerOpen = !drawerOpen;
            if (drawerOpen) {
                drawer.style.transform = 'translateX(0)';
                toggle.querySelector('span').innerText = 'close';
            } else {
                drawer.style.transform = 'translateX(-100%)';
                toggle.querySelector('span').innerText = 'menu';
            }
        });

        // Mobile Scroll Prevention
        document.body.addEventListener('touchmove', function(e){ e.preventDefault(); }, { passive: false });
    </script>
