<script>
        // Micro-interactions and atmospheric logic
        document.querySelectorAll('.glass-panel').forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                card.style.setProperty('--mouse-x', `${x}px`);
                card.style.setProperty('--mouse-y', `${y}px`);
            });
        });

        // Simple preview toggle interaction
        const previewBtn = document.querySelector('button:has(.material-symbols-outlined:contains("visibility"))');
        if (previewBtn) {
            previewBtn.addEventListener('click', () => {
                const canvasImg = document.querySelector('.preview-canvas');
                canvasImg.classList.toggle('scale-105');
                canvasImg.style.transition = 'transform 2s ease-out';
            });
        }
    </script>
