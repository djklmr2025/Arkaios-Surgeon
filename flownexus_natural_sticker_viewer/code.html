<!DOCTYPE html><html class="dark" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
<title>FlowNexus | Visor de Modelo Interactivo</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;family=JetBrains+Mono:wght@400&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<style>
        :root {
            --surface: #121318;
            --primary: #00d4ff;
        }
        body {
            background-color: var(--surface);
            touch-action: none;
            overflow: hidden;
        }
        .studio-environment {
            background: radial-gradient(circle at center, #1e1f25 0%, #121318 70%, #0d0e13 100%);
            perspective: 1000px;
        }
        .model-shadow {
            filter: drop-shadow(0 20px 50px rgba(0, 0, 0, 0.8));
        }
        .glass-ui {
            background: rgba(26, 27, 33, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        #viewer-container {
            width: 100vw;
            height: 100vh;
            cursor: grab;
        }
        #viewer-container:active {
            cursor: grabbing;
        }
        #model-wrapper {
            transition: transform 0.1s ease-out;
            transform-origin: center;
            will-change: transform;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .active-fill {
            font-variation-settings: 'FILL' 1;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                "surface": "#121318",
                "on-surface": "#e3e1e9",
                "primary": "#a8e8ff",
                "primary-container": "#00d4ff",
                "secondary": "#3ee272",
                "surface-container": "#1e1f25",
                "surface-container-lowest": "#0d0e13",
                "outline": "#859398"
              },
              "borderRadius": {
                "DEFAULT": "0.125rem",
                "lg": "0.25rem",
                "xl": "0.5rem",
                "full": "0.75rem"
              },
              "fontFamily": {
                "body-base": ["Inter"],
                "technical-sm": ["JetBrains Mono"],
                "display-lg": ["Inter"]
              }
            }
          }
        }
    </script>
</head>
<body class="studio-environment text-on-surface font-body-base">
<!-- Top Navigation (Minimal) -->
<header class="fixed top-0 left-0 w-full z-50 flex items-center justify-between p-4 pointer-events-none">
<div class="flex items-center gap-3 pointer-events-auto">
<button class="w-10 h-10 glass-ui rounded-full flex items-center justify-center text-primary active:scale-95 transition-transform">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="glass-ui px-4 py-2 rounded-full">
<h1 class="font-display-lg text-[14px] font-bold tracking-tight text-white">Red del Metro v2.4</h1>
</div>
</div>
<div class="flex items-center gap-3 pointer-events-auto">
<div class="glass-ui px-3 py-1.5 rounded-full flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-primary-container animate-pulse shadow-[0_0_8px_#00d4ff]"></span>
<span class="text-primary-container font-technical-sm text-[10px] uppercase tracking-widest font-bold">Sincro en vivo</span>
</div>
<button class="bg-primary-container text-black px-4 py-2 rounded-full font-bold text-[12px] uppercase tracking-wider hover:opacity-90 active:scale-95 transition-all shadow-lg">
            Publicar
        </button>
</div>
</header>
<!-- Interactive Canvas Area -->
<div class="relative flex items-center justify-center overflow-hidden" id="viewer-container">
<div class="relative" id="model-wrapper" style="transform: translate(0px, 0px) scale(1);">
<div class="model-shadow">
<img alt="Interactive Model" class="max-w-[90vw] max-h-[80vh] object-contain rounded-xl select-none" draggable="false" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD5Odurzbuk4ALT0Q19_43i9vMuaypquxTRGtF_CXdjwpy9fk_stPm0dkRueu-gP_LU4My62_iBcmpvnHFQrypd8XSlnvIW1awgQXCkmJtsIx7GSRltobJ5vMzLy92jMhC8UJJY2qbXXzbzDOHL5z0PMoSm54obldkmxc_LuKwUCk19W0zAypV0CpO7suJdZRikefIdZZVgmiqYFBa4d7PQIeXjCkA86m7Z-yLYc5Afe_4kTQ4gsE1VbfMWZphuaUm4SXiCdkE71VM">
</div>
<!-- Interactive Hotspot Example -->
<div class="absolute top-1/4 left-1/3 group">
<div class="w-4 h-4 bg-primary-container rounded-full animate-ping absolute inset-0"></div>
<div class="w-4 h-4 bg-primary-container rounded-full relative z-10 border-2 border-white shadow-xl cursor-pointer"></div>
<div class="absolute bottom-full left-1/2 -translate-x-1/2 mb-3 hidden group-hover:block glass-ui p-3 rounded-lg w-48 text-[11px] leading-tight">
<p class="font-bold text-primary mb-1">Intersección Nodal 04</p>
<p class="text-on-surface/70">Rendimiento del tráfico estabilizado al 98,4% de capacidad. No se detectó latencia.</p>
</div>
</div>
</div>
</div>
<!-- Bottom UI Elements -->
<div class="fixed bottom-0 left-0 w-full p-6 flex flex-col items-center gap-6 z-50 pointer-events-none">
<!-- Action Bar -->
<div class="flex items-center gap-4 pointer-events-auto">
<!-- Social/Share -->
<button class="glass-ui px-5 py-3 rounded-full flex items-center gap-2 hover:bg-white/5 active:scale-95 transition-all text-secondary">
<span class="material-symbols-outlined text-[20px] active-fill">share</span>
<span class="font-bold text-[13px]">WhatsApp</span>
</button>
<!-- Ratings -->
<div class="glass-ui flex items-center rounded-full overflow-hidden">
<button class="px-5 py-3 hover:bg-white/5 active:scale-95 transition-all border-r border-white/10 text-on-surface/80 hover:text-primary">
<span class="material-symbols-outlined text-[20px]">thumb_up</span>
</button>
<button class="px-5 py-3 hover:bg-white/5 active:scale-95 transition-all text-on-surface/80 hover:text-error">
<span class="material-symbols-outlined text-[20px]">thumb_down</span>
</button>
</div>
<!-- Zoom Controls (Visual only, JS handles actual interaction) -->
<div class="glass-ui flex items-center rounded-full px-2 gap-1">
<button class="w-10 h-10 flex items-center justify-center text-on-surface/60 hover:text-white transition-colors" onclick="zoomManual(0.8)">
<span class="material-symbols-outlined">remove</span>
</button>
<span class="font-technical-sm text-[10px] w-8 text-center text-primary-container" id="zoom-level">Sincro en vivo</span>
<button class="w-10 h-10 flex items-center justify-center text-on-surface/60 hover:text-white transition-colors" onclick="zoomManual(1.2)">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</div>
<!-- Status Toast -->
<div class="glass-ui px-4 py-2 rounded-lg flex items-center gap-3 animate-pulse">
<span class="material-symbols-outlined text-primary text-[16px]">visibility</span>
<p class="font-technical-sm text-[10px] uppercase tracking-widest text-on-surface/60">Modo actual: <span class="text-white">Visor de Stickers</span></p>
</div>
</div>
<script>
    const container = document.getElementById('viewer-container');
    const wrapper = document.getElementById('model-wrapper');
    const zoomText = document.getElementById('zoom-level');

    let scale = 1;
    let pointX = 0;
    let pointY = 0;
    let startX = 0;
    let startY = 0;
    let isPanning = false;

    // Pan function
    container.onmousedown = function(e) {
        e.preventDefault();
        startX = e.clientX - pointX;
        startY = e.clientY - pointY;
        isPanning = true;
    };

    window.onmousemove = function(e) {
        if (!isPanning) return;
        pointX = e.clientX - startX;
        pointY = e.clientY - startY;
        updateTransform();
    };

    window.onmouseup = function() {
        isPanning = false;
    };

    // Zoom function
    container.onwheel = function(e) {
        e.preventDefault();
        const xs = (e.clientX - pointX) / scale;
        const ys = (e.clientY - pointY) / scale;
        const delta = -e.deltaY;
        
        delta > 0 ? (scale *= 1.1) : (scale /= 1.1);
        
        // Clamp scale
        scale = Math.min(Math.max(0.3, scale), 5);
        
        pointX = e.clientX - xs * scale;
        pointY = e.clientY - ys * scale;

        updateTransform();
    };

    // Manual Zoom Buttons
    window.zoomManual = function(factor) {
        scale *= factor;
        scale = Math.min(Math.max(0.3, scale), 5);
        updateTransform();
    };

    function updateTransform() {
        wrapper.style.transform = `translate(${pointX}px, ${pointY}px) scale(${scale})`;
        zoomText.innerText = Math.round(scale * 100) + '%';
    }

    // Pinch-to-zoom simulation for touch devices
    let evCache = [];
    let prevDiff = -1;

    container.ontouchstart = (e) => {
        if (e.touches.length === 2) {
            evCache.push(e.touches[0], e.touches[1]);
        } else {
            startX = e.touches[0].clientX - pointX;
            startY = e.touches[0].clientY - pointY;
            isPanning = true;
        }
    };

    container.ontouchmove = (e) => {
        if (e.touches.length === 2) {
            let curDiff = Math.sqrt(
                Math.pow(e.touches[0].clientX - e.touches[1].clientX, 2) +
                Math.pow(e.touches[0].clientY - e.touches[1].clientY, 2)
            );

            if (prevDiff > 0) {
                if (curDiff > prevDiff) scale *= 1.02;
                if (curDiff < prevDiff) scale /= 1.02;
                scale = Math.min(Math.max(0.3, scale), 5);
                updateTransform();
            }
            prevDiff = curDiff;
        } else if (isPanning) {
            pointX = e.touches[0].clientX - startX;
            pointY = e.touches[0].clientY - startY;
            updateTransform();
        }
    };

    container.ontouchend = (e) => {
        prevDiff = -1;
        isPanning = false;
    };

    // Center model initially
    window.onload = () => {
        updateTransform();
    };
</script>


</body></html>
